<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="index.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Student Registration Form</h1>

    <fieldset>
        <form onsubmit="return registerstd()">

            <label>First Name:</label><br>
            <input type="text" id="fname" name="fname"/>
            <p id="fnameErr" class="error"></p>

            <label>Last Name:</label><br>
            <input type="text" id="lname" name="lname"/>
            <p id="lnameErr" class="error"></p>

            <label>Student Id:</label><br>
            <input type="text" id="id"/>
            <p id="idErr" class="error"></p>

            <label>Email:</label><br>
            <input type="text" id="email" name="email"/>
            <p id="emailErr" class="error"></p>

            <label>Completed Credit:</label><br>
            <input type="number" id="credit" />
            <p id="creditErr" class="error"></p>

            <label>Department:</label><br>
            <select id="dept">
                <option value="">Select Department</option>
                <option value="CSE">CSE</option>
                <option value="EEE">EEE</option>
                <option value="COE">COE</option>
                <option value="CS">CS</option>
                <option value="Architecture">Architecture</option>
            </select>
            <p id="deptErr" class="error"></p>

            <button type="submit">SUBMIT</button>
        </form>
    </fieldset>

    <h2>Registered Student Lists</h2>

    <table id="stdTable">
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Student ID</th>
            <th>Email</th>
            <th>Credits</th>
            <th>Department</th>
        </tr>
    </table>

</body>
</html>
