<!DOCTYPE html>
<html>
<head>
<title>Pental Shop</title>
<link rel="stylesheet" href="script.css">
</head>
<body>

    <h1>Welcome to Pental Shop</h1>

    <table>
        <tr>
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>Pencils</td>
            <td>100</td>
            <td>In Stock</td>
        </tr>
        <tr>
            <td>Notebooks</td>
            <td>50</td>
            <td>Low Stock</td>
        </tr>
        <tr>
            <td>Markers</td>
            <td>15</td>
            <td>In Stock</td>
        </tr>
    </table>

    <div class="form-box">
        <h2>Contact Information</h2>
        <form>
            <div class="row">
                <label>Name</label>
                <input type="text">
            </div>
            <div class="row">
                <label>Email</label>
                <input type="email">
            </div>
            <div class="row">
                <label>Message</label>
                <textarea></textarea>
            </div>
            <button type="submit">Submit</button>
        </form>
    </div>

</body>
</html>
